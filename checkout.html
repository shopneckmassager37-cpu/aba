<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — Chefaleh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { cream:'#F9F7F2', charcoal:'#1A1A1A', gold:'#D4AF37', 'cream-dark':'#EFEDE6' },
        fontFamily: { serif:['"Cormorant Garamond"','Georgia','serif'], sans:['Jost','sans-serif'] }
      }}
    }
  </script>
</head>
<body class="bg-cream text-charcoal font-sans">

<nav class="bg-cream border-b border-charcoal/10 py-4">
  <div class="max-w-4xl mx-auto px-5 text-center">
    <a href="index.html" class="font-serif text-xl tracking-[.2em] text-charcoal font-light">CHEFALEH</a>
  </div>
</nav>

<main class="max-w-4xl mx-auto px-5 py-12">
  <h1 class="font-serif text-4xl mb-8 text-center">Checkout Summary</h1>
  
  <div class="bg-white p-8 shadow-sm border border-charcoal/5 mb-8">
    <h2 class="text-xl font-bold mb-4">Order Summary</h2>
    <div id="checkout-items" class="space-y-4 mb-6 text-sm">
      <!-- Items -->
    </div>
    <div class="border-t border-charcoal/10 pt-4 space-y-2 text-sm">
      <div class="flex justify-between"><span>Shipping</span><span>$0.00</span></div>
      <div class="flex justify-between"><span>Tax (7%)</span><span>$0.00</span></div>
      <div class="flex justify-between">
        <label>Chef Tip:</label>
        <select class="border p-1">
          <option>0%</option><option>5%</option><option>10%</option><option>15%</option><option>20%</option>
        </select>
      </div>
      <div class="flex justify-between">
        <label>Driver Tip ($):</label>
        <input type="number" class="border p-1 w-20" placeholder="0">
      </div>
      <div class="flex justify-between text-2xl font-bold pt-4 text-gold border-t border-charcoal/10">
        <span>Total</span>
        <span>$0.00</span>
      </div>
    </div>
  </div>

  <div class="bg-white p-8 shadow-sm border border-charcoal/5 mb-8">
    <h2 class="text-xl font-bold mb-4">Customer Details</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input type="text" placeholder="Full Name" class="border p-3 w-full">
      <input type="tel" placeholder="Phone" class="border p-3 w-full">
      <input type="email" placeholder="Email" class="border p-3 w-full">
      <input type="text" placeholder="Delivery Address" class="border p-3 w-full">
      <textarea placeholder="Notes (optional)" class="border p-3 w-full md:col-span-2"></textarea>
    </div>
  </div>

  <div class="bg-amber-50 p-6 border border-amber-200 mb-8">
    <h3 class="font-bold mb-2">Important Notice</h3>
    <p class="text-sm">⚠️ Orders are confirmed only upon payment receipt. Please complete your payment immediately after submitting your order.</p>
  </div>

  <button onclick="window.location.href='confirmation.html'" class="w-full bg-charcoal text-cream py-4 uppercase tracking-widest font-medium hover:bg-gold transition-colors">
    Submit Order
  </button>
</main>

</body>
</html>
