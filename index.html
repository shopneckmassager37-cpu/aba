<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chefaleh — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%}
    body{
      background:#1A1A1A;
      color:#F9F7F2;
      font-family:'Jost',sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      overflow:hidden;
    }
    .gold-bar{height:1px;background:linear-gradient(to right,transparent,#D4AF37,transparent);margin:2.5rem auto;max-width:320px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .fade-up{animation:fadeUp 1s ease forwards}
    .delay-1{animation-delay:.15s;opacity:0}
    .delay-2{animation-delay:.3s;opacity:0}
    .delay-3{animation-delay:.45s;opacity:0}
    .delay-4{animation-delay:.6s;opacity:0}
    
    .enter-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 12px 32px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      color: #D4AF37;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .enter-btn:hover {
      background: #D4AF37;
      color: #1A1A1A;
      border-color: #D4AF37;
    }
  </style>
</head>
<body>
  <div class="fade-up" style="text-align:center;padding:2rem;max-width:560px;width:100%">
    <p class="delay-1 fade-up" style="color:#D4AF37;font-size:11px;letter-spacing:.45em;text-transform:uppercase;font-weight:300;margin-bottom:1.5rem">
      Private Chef Experience
    </p>
    <h1 class="delay-2 fade-up" style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(3rem,8vw,5.5rem);line-height:1.05;margin-bottom:.5rem">
      CHEFALEH
    </h1>
    <h2 class="delay-2 fade-up" style="font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(1.4rem,4vw,2.4rem);color:#D4AF37;margin-bottom:0">
      Coming Soon
    </h2>
    <div class="gold-bar delay-3 fade-up"></div>
    <p class="delay-3 fade-up" style="color:rgba(249,247,242,.45);font-size:14px;font-weight:300;line-height:1.8;margin-bottom:2.5rem">
      Bespoke Shabbat cuisine crafted with hand-selected<br/>ingredients and small-batch precision.<br/>South Florida · Every Friday
    </p>
    
    <div class="delay-4 fade-up">
      <a href="menu.html" class="enter-btn">View Menu</a>
    </div>
  </div>
</body>
</html>
